<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lexicon</title>
<link rel="stylesheet" href="lexicon.css">
</head>
<body>

<div class="page-header">
  <span class="page-title">Lexicon</span>
  <span class="page-meta" id="word-count"></span>
</div>

<div class="table-wrap">
  <table class="word-table">
    <thead>
      <tr>
        <th title="Japanese word">Word</th>
        <th title="Hiragana reading">Reading</th>
        <th title="Part of speech">Type</th>
        <th title="English meaning">Meaning</th>
        <th class="col-num" title="Times answered correctly">✓</th>
        <th class="col-num" title="Times answered incorrectly">✗</th>
        <th class="col-num" title="Target number of additional drills">🎯</th>
      </tr>
    </thead>
    <tbody id="word-tbody"></tbody>
  </table>
</div>

<script src="lexicon.js"></script>
</body>
</html>
