<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Story</title>
<link rel="icon" href="/static/favicon.ico">
<link rel="stylesheet" href="/static/common.css">
<link rel="stylesheet" href="/static/story.css">
</head>
<body>

<div class="page-header">
  <div class="num-stepper story-speed-stepper" data-tooltip="Playback speed">
    <button class="num-btn" type="button" id="story-speed-dec">−</button>
    <input type="number" id="story-speed-val" value="1.00" min="0.5" max="2.0" step="0.05" readonly>
    <button class="num-btn" type="button" id="story-speed-inc">+</button>
  </div>
  <button class="btn-header" id="story-tts-btn" aria-label="Play story" disabled>
    <svg id="story-tts-icon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>
  </button>
  <input type="range" id="story-seekbar" class="story-seekbar" min="0" max="1000" step="1" value="0" hidden>
  <div class="nav-and-settings">
    <button class="btn-settings" id="settings-btn" aria-label="Settings"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg></button>
    {{template "app_nav" .}}
  </div>
</div>

<!-- Generate audio modal (confirmation + progress) -->
<div class="modal-backdrop hidden" id="story-gen-modal-backdrop">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Generate audio</span>
      <button class="modal-close" aria-label="Close">✕</button>
    </div>
    <div class="modal-body" style="padding:1.25rem 1.5rem">
      <div id="gen-confirm-body">
        <p style="color:#cdd6f4;line-height:1.6">Generate VoiceVox narration for this story?<br>
        Any existing audio will be replaced.</p>
      </div>
      <div id="gen-progress-body" class="hidden">
        <p id="gen-progress-count" class="gen-progress-count"></p>
        <div id="gen-sentence-list" class="gen-sentence-list"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" id="story-gen-modal-cancel">Cancel</button>
      <button class="btn-save" id="story-gen-modal-confirm">Generate</button>
      <button class="btn-danger hidden" id="story-gen-cancel-generation-btn">
        <span class="spinner"></span>&nbsp;Cancel generation
      </button>
      <button class="btn-save hidden" id="story-gen-modal-done">Done</button>
    </div>
  </div>
</div>

<main class="story-body">
  <div class="story-shell">
    <div class="story-top-bar">
      <a class="story-back-link" href="/stories">← Back to stories</a>
      <button class="btn-save story-gen-btn" id="story-gen-btn" disabled>Generate audio</button>
    </div>
    <h1 id="story-title" class="story-title"></h1>
    <div id="story-content" class="story-content"></div>
    <p id="story-error" class="story-error" hidden>Could not load this story.</p>
  </div>
</main>

<script type="module" src="/static/common.js"></script>
<script type="module" src="/static/story.js"></script>
</body>
</html>
