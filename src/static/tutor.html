<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tutor</title>
<link rel="icon" href="/static/favicon.ico">
<link rel="stylesheet" href="/static/common.css">
<link rel="stylesheet" href="/static/tutor.css">
</head>
<body>

<div class="page-header">
  <div class="tutor-header-controls">
    <span class="tutor-select-label">Mode</span>
    <select id="tutor-mode-select" class="tutor-select"></select>
    <span class="tutor-select-label">Model</span>
    <select id="tutor-model-select" class="tutor-select"></select>
    <span id="tutor-provider-info" class="provider-info-icon" style="display:none">?</span>
    <button id="btn-new-chat" class="btn-header" data-tooltip="New chat">↺</button>
    <button id="btn-debug-toggle" class="btn-header" data-tooltip="Toggle debug view">{}</button>
  </div>
  <div class="nav-and-settings">
    <button class="btn-settings" id="settings-btn" aria-label="Settings"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.01 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg></button>
    {{template "app_nav" .}}
  </div>
</div>

<main class="tutor-body">
  <div id="tutor-messages" class="tutor-messages"></div>
  <form id="tutor-form" class="tutor-input-row">
    <textarea id="tutor-input" class="tutor-input" placeholder="Type a message…" rows="1"></textarea>
    <button type="submit" id="btn-tutor-send" class="btn-tutor-send">Send <span class="btn-hotkey">⇧↵</span></button>
  </form>
</main>

<script type="module" src="/static/common.js"></script>
<script type="module" src="/static/tutor.js"></script>
</body>
</html>
