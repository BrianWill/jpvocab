<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drill - Compact</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #1e1e2e;
    color: #cdd6f4;
    display: flex;
    min-height: 100vh;
  }

  /* --- Sidebar --- */
  .sidebar {
    width: 260px;
    min-width: 260px;
    background: #11111b;
    border-right: 1px solid #313244;
    padding: 1rem 0;
    display: flex;
    flex-direction: column;
  }
  .sidebar-title {
    font-size: 0.8rem;
    font-weight: 600;
    color: #89b4fa;
    padding: 0 0.75rem 0.5rem;
  }
  .sidebar-list {
    list-style: none;
    flex: 1;
    overflow-y: auto;
  }
  .sidebar-item {
    padding: 0.35rem 0.75rem;
    font-size: 0.95rem;
    cursor: default;
  }
  .sidebar-item.unseen { color: #585b70; filter: blur(4px); user-select: none; }
  .sidebar-item.unseen:hover { filter: none; background: #1e1e2e; }
  .sidebar-item.known { color: #a6e3a1; }
  .sidebar-item.missed { color: #f38ba8; }
  .sidebar-item:hover { background: #1e1e2e; }

  @keyframes flash-known {
    0% { background: rgba(166,227,161,0.25); }
    100% { background: transparent; }
  }
  @keyframes flash-missed {
    0% { background: rgba(243,139,168,0.25); }
    100% { background: transparent; }
  }
  .sidebar-item.flash-known { animation: flash-known 2.8s ease-out; }
  .sidebar-item.flash-missed { animation: flash-missed 2.8s ease-out; }

  /* --- Tooltip (attached to body) --- */
  .tooltip {
    display: none;
    position: fixed;
    background: #1e1e2e;
    border: 1px solid #313244;
    border-radius: 6px;
    padding: 0.6rem 0.8rem;
    width: 220px;
    z-index: 100;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    pointer-events: none;
  }
  .tooltip.visible { display: block; }
  .tooltip-word {
    font-size: 1.1rem;
    font-weight: 700;
    color: #cdd6f4;
    margin-bottom: 0.25rem;
  }
  .tooltip-reading {
    font-size: 0.85rem;
    color: #89b4fa;
    margin-bottom: 0.2rem;
  }
  .tooltip-pos {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #585b70;
    margin-bottom: 0.15rem;
  }
  .tooltip-meaning {
    font-size: 0.9rem;
    font-weight: 600;
    color: #cdd6f4;
    margin-bottom: 0.3rem;
  }
  .tooltip-example {
    font-size: 0.75rem;
    color: #585b70;
    line-height: 1.4;
  }
  .tooltip-example-en {
    font-style: italic;
    color: #6c7086;
  }

  /* --- Main content --- */
  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1.5rem;
  }

  .sidebar-stats {
    padding: 0 0.75rem 0.75rem;
    font-size: 0.8rem;
    color: #6c7086;
  }
  .counters {
    display: flex;
    margin-bottom: 0.5rem;
  }
  .counter {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }
  .counter span {
    display: inline-block;
    width: 1.4em;
    text-align: right;
  }
  .counter .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }
  .dot-remaining { background: #89b4fa; }
  .dot-redo { background: #f38ba8; }
  .dot-done { background: #a6e3a1; }

  .progress {
    width: 100%;
    height: 3px;
    background: #313244;
    border-radius: 2px;
  }
  .progress-bar {
    height: 100%;
    width: 30%;
    background: #89b4fa;
    border-radius: 2px;
  }

  .main-area {
    width: 100%;
    max-width: 600px;
    background: #181825;
    border: 1px solid #313244;
    border-radius: 8px;
    overflow: hidden;
  }

  .prompt-section {
    padding: 2.5rem 2rem;
    text-align: center;
    border-bottom: 1px solid #313244;
  }

  .word-jp {
    font-size: 2.8rem;
    font-weight: 700;
    color: #cdd6f4;
  }

  .example-jp {
    font-size: 0.95rem;
    color: #585b70;
    margin-top: 0.5rem;
  }

  .detail-section {
    padding: 1.5rem 2rem;
    border-bottom: 1px solid #313244;
  }

  .detail-grid {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 0.4rem 1.2rem;
    font-size: 0.9rem;
  }
  .detail-label {
    color: #585b70;
    text-align: right;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    line-height: 1.6;
    padding-top: 0.15rem;
  }
  .detail-value {
    color: #cdd6f4;
    line-height: 1.6;
  }
  .detail-value.highlight {
    color: #89b4fa;
    font-weight: 600;
    font-size: 1.1rem;
    line-height: 1.6;
  }
  .detail-value.meaning-text {
    font-size: 1.1rem;
    font-weight: 600;
    line-height: 1.6;
  }
  .detail-placeholder {
    color: #313244;
    letter-spacing: 0.15em;
    user-select: none;
  }

  .button-area {
    width: 100%;
    max-width: 600px;
    margin-top: 0.75rem;
  }

  .action-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
  }

  .btn {
    border: none;
    cursor: pointer;
    transition: all 0.1s;
    font-family: inherit;
  }
  .btn:active { transform: scale(0.95); }

  .btn-no, .btn-yes {
    border-radius: 6px;
    padding: 0.7rem 1.8rem;
    font-size: 0.9rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 0.4rem;
    flex: 1;
    justify-content: center;
  }

  .btn-no {
    background: rgba(243,139,168,0.1);
    border: 1px solid rgba(243,139,168,0.25);
    color: #f38ba8;
  }
  .btn-no:hover { background: rgba(243,139,168,0.18); }

  .btn-yes {
    background: rgba(166,227,161,0.1);
    border: 1px solid rgba(166,227,161,0.25);
    color: #a6e3a1;
  }
  .btn-yes:hover { background: rgba(166,227,161,0.18); }

  .btn-next {
    background: rgba(137,180,250,0.1);
    border: 1px solid rgba(137,180,250,0.25);
    color: #89b4fa;
    border-radius: 6px;
    padding: 0.7rem 0;
    font-size: 0.9rem;
    font-weight: 600;
    width: 100%;
  }
  .btn-next:hover { background: rgba(137,180,250,0.18); }

  .key-hint {
    font-size: 0.65rem;
    color: #7c7e8b;
    background: #313244;
    padding: 0.1rem 0.4rem;
    border-radius: 3px;
  }

  .word-jp.knew { color: #a6e3a1; }
  .word-jp.missed { color: #f38ba8; }
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <div class="sidebar-title" id="sidebar-title">Round 1</div>
  <div class="sidebar-stats">
    <div class="counters">
      <div class="counter"><div class="dot dot-remaining"></div> <span id="stat-left">0</span> left</div>
      <div class="counter"><div class="dot dot-redo"></div> <span id="stat-redo">0</span> redo</div>
      <div class="counter"><div class="dot dot-done"></div> <span id="stat-done">0</span> done</div>
    </div>
    <div class="progress"><div class="progress-bar"></div></div>
  </div>
  <ul class="sidebar-list" id="sidebar-list"></ul>
</div>

<!-- Floating tooltip -->
<div class="tooltip" id="tooltip">
  <div class="tooltip-word" id="tip-word"></div>
  <div class="tooltip-reading" id="tip-reading"></div>
  <div class="tooltip-pos" id="tip-pos"></div>
  <div class="tooltip-meaning" id="tip-meaning"></div>
  <div class="tooltip-example" id="tip-example"></div>
  <div class="tooltip-example-en" id="tip-example-en"></div>
</div>

<!-- Main content -->
<div class="content">
  <div class="main-area">
    <div class="prompt-section">
      <div class="word-jp">走る</div>
      <div class="example-jp">公園を走る。</div>
    </div>

    <div class="detail-section" id="details">
      <div class="detail-grid">
        <div class="detail-label">Reading</div>
        <div class="detail-value highlight" id="val-reading"><span class="detail-placeholder">- - -</span></div>
        <div class="detail-label">Meaning</div>
        <div class="detail-value meaning-text" id="val-meaning"><span class="detail-placeholder">- - -</span></div>
        <div class="detail-label">Type</div>
        <div class="detail-value" id="val-type"><span class="detail-placeholder">- - -</span></div>
        <div class="detail-label">Example</div>
        <div class="detail-value" id="val-example" style="font-style:italic; color:#6c7086"><span class="detail-placeholder">- - -</span></div>
      </div>
    </div>
  </div>

  <div class="button-area">
    <!-- Prompt buttons -->
    <div class="action-bar" id="action-prompt">
      <button class="btn btn-no" onclick="reveal(false)">
        ✕ Don't know <span class="key-hint">A</span>
      </button>
      <button class="btn btn-yes" onclick="reveal(true)">
        ✓ Know it <span class="key-hint">D</span>
      </button>
    </div>

    <!-- Next button -->
    <div class="action-bar" id="action-next" style="display:none">
      <button class="btn btn-next" onclick="next()">
        Next → <span class="key-hint">Space</span>
      </button>
    </div>
  </div>
</div>

<script>
  const placeholder = '<span class="detail-placeholder">- - -</span>';

  const words = [
    { word: '走る', reading: 'はしる', meaning: 'to run', type: 'verb', exampleJp: '公園を走る。', exampleEn: '"I run in the park."' },
    { word: '美しい', reading: 'うつくしい', meaning: 'beautiful', type: 'i-adjective', exampleJp: '美しい花が咲いている。', exampleEn: '"Beautiful flowers are blooming."' },
    { word: '話す', reading: 'はなす', meaning: 'to speak; to talk', type: 'verb', exampleJp: '日本語を話す。', exampleEn: '"I speak Japanese."' },
    { word: '静か', reading: 'しずか', meaning: 'quiet', type: 'na-adjective', exampleJp: '図書館は静かだ。', exampleEn: '"The library is quiet."' },
    { word: '始める', reading: 'はじめる', meaning: 'to begin; to start', type: 'verb', exampleJp: '仕事を始める。', exampleEn: '"I start work."' },
    { word: '天気', reading: 'てんき', meaning: 'weather', type: 'noun', exampleJp: '今日は天気がいい。', exampleEn: '"The weather is nice today."' },
    { word: '忘れる', reading: 'わすれる', meaning: 'to forget', type: 'verb', exampleJp: '名前を忘れる。', exampleEn: '"I forget the name."' },
    { word: '危ない', reading: 'あぶない', meaning: 'dangerous', type: 'i-adjective', exampleJp: 'この道は危ない。', exampleEn: '"This road is dangerous."' },
    { word: '選ぶ', reading: 'えらぶ', meaning: 'to choose; to select', type: 'verb', exampleJp: '好きな色を選ぶ。', exampleEn: '"I choose my favorite color."' },
    { word: '問題', reading: 'もんだい', meaning: 'problem; question', type: 'noun', exampleJp: '問題を解く。', exampleEn: '"I solve the problem."' },
    { word: '暖かい', reading: 'あたたかい', meaning: 'warm', type: 'i-adjective', exampleJp: '今日は暖かい。', exampleEn: '"It is warm today."' },
    { word: '借りる', reading: 'かりる', meaning: 'to borrow', type: 'verb', exampleJp: '本を借りる。', exampleEn: '"I borrow a book."' },
    { word: '経験', reading: 'けいけん', meaning: 'experience', type: 'noun', exampleJp: 'いい経験になった。', exampleEn: '"It became a good experience."' },
    { word: '集める', reading: 'あつめる', meaning: 'to collect; to gather', type: 'verb', exampleJp: '切手を集める。', exampleEn: '"I collect stamps."' },
    { word: '複雑', reading: 'ふくざつ', meaning: 'complicated; complex', type: 'na-adjective', exampleJp: 'この地図は複雑だ。', exampleEn: '"This map is complicated."' },
    { word: '届く', reading: 'とどく', meaning: 'to arrive; to reach', type: 'verb', exampleJp: '手紙が届く。', exampleEn: '"The letter arrives."' },
    { word: '練習', reading: 'れんしゅう', meaning: 'practice', type: 'noun', exampleJp: '毎日練習する。', exampleEn: '"I practice every day."' },
    { word: '眠い', reading: 'ねむい', meaning: 'sleepy', type: 'i-adjective', exampleJp: 'とても眠い。', exampleEn: '"I am very sleepy."' },
    { word: '伝える', reading: 'つたえる', meaning: 'to convey; to tell', type: 'verb', exampleJp: '気持ちを伝える。', exampleEn: '"I convey my feelings."' },
    { word: '丁寧', reading: 'ていねい', meaning: 'polite; careful', type: 'na-adjective', exampleJp: '丁寧に説明する。', exampleEn: '"I explain politely."' },
    { word: '探す', reading: 'さがす', meaning: 'to search; to look for', type: 'verb', exampleJp: '鍵を探す。', exampleEn: '"I look for the key."' },
    { word: '景色', reading: 'けしき', meaning: 'scenery; view', type: 'noun', exampleJp: '景色がきれいだ。', exampleEn: '"The scenery is beautiful."' },
    { word: '壊れる', reading: 'こわれる', meaning: 'to break (intransitive)', type: 'verb', exampleJp: '時計が壊れる。', exampleEn: '"The clock breaks."' },
    { word: '残念', reading: 'ざんねん', meaning: 'regrettable; unfortunate', type: 'na-adjective', exampleJp: '残念な結果だった。', exampleEn: '"It was an unfortunate result."' },
    { word: '誘う', reading: 'さそう', meaning: 'to invite', type: 'verb', exampleJp: '友達を誘う。', exampleEn: '"I invite a friend."' },
    { word: '約束', reading: 'やくそく', meaning: 'promise; appointment', type: 'noun', exampleJp: '約束を守る。', exampleEn: '"I keep the promise."' },
    { word: '優しい', reading: 'やさしい', meaning: 'kind; gentle', type: 'i-adjective', exampleJp: '彼は優しい人だ。', exampleEn: '"He is a kind person."' },
    { word: '受ける', reading: 'うける', meaning: 'to receive; to take (exam)', type: 'verb', exampleJp: '試験を受ける。', exampleEn: '"I take an exam."' },
    { word: '自由', reading: 'じゆう', meaning: 'freedom; free', type: 'na-adjective', exampleJp: '自由な時間が欲しい。', exampleEn: '"I want free time."' },
    { word: '捨てる', reading: 'すてる', meaning: 'to throw away', type: 'verb', exampleJp: 'ゴミを捨てる。', exampleEn: '"I throw away the trash."' },
  ];

  // Drill session state
  let round = 1;
  let remaining = [...words];  // words left in this round
  let redo = [];               // missed words for next round
  let doneCount = 0;           // total words marked known
  let currentWord = remaining[0];

  function updateStats() {
    document.getElementById('stat-left').textContent = remaining.length;
    document.getElementById('stat-redo').textContent = redo.length;
    document.getElementById('stat-done').textContent = doneCount;
    document.getElementById('sidebar-title').textContent = 'Round ' + round;

    const total = remaining.length + redo.length + doneCount;
    const pct = total > 0 ? (doneCount / total) * 100 : 0;
    document.querySelector('.progress-bar').style.width = pct + '%';
  }

  function showWord() {
    document.querySelector('.word-jp').textContent = currentWord.word;
    document.querySelector('.example-jp').textContent = currentWord.exampleJp;
  }

  function reveal(knew) {
    // Add to sidebar immediately
    addToSidebar(currentWord, knew);

    // Update drill state
    remaining.shift();
    if (knew) {
      doneCount++;
    } else {
      redo.push(currentWord);
    }
    updateStats();

    // Show answer details
    document.getElementById('val-reading').textContent = currentWord.reading;
    document.getElementById('val-meaning').textContent = currentWord.meaning;
    document.getElementById('val-type').textContent = currentWord.type;
    document.getElementById('val-example').textContent = currentWord.exampleEn;

    document.getElementById('action-prompt').style.display = 'none';
    document.getElementById('action-next').style.display = 'flex';

    const wordEl = document.querySelector('.word-jp');
    wordEl.classList.add(knew ? 'knew' : 'missed');
  }

  // Populate sidebar with all words as unseen
  function initSidebar() {
    const list = document.getElementById('sidebar-list');
    words.forEach(word => {
      const li = document.createElement('li');
      li.className = 'sidebar-item unseen';
      li.textContent = word.word;
      li.dataset.word = JSON.stringify(word);
      li.dataset.id = word.word;
      list.appendChild(li);
    });
  }
  initSidebar();

  function addToSidebar(word, knew) {
    const list = document.getElementById('sidebar-list');

    // Remove existing entry for this word if present
    const existing = list.querySelector('[data-id="' + word.word + '"]');
    if (existing) existing.remove();

    const li = document.createElement('li');
    li.className = 'sidebar-item ' + (knew ? 'known flash-known' : 'missed flash-missed');
    li.textContent = word.word;
    li.dataset.word = JSON.stringify(word);
    li.dataset.id = word.word;
    li.addEventListener('animationend', () => li.classList.remove('flash-known', 'flash-missed'));

    // Order: unseen, then missed, then known
    if (!knew) {
      // Missed: top of missed section = right after last unseen
      const firstNonUnseen = list.querySelector('.sidebar-item.missed, .sidebar-item.known');
      if (firstNonUnseen) {
        list.insertBefore(li, firstNonUnseen);
      } else {
        list.appendChild(li);
      }
    } else {
      // Known: top of known section = right after last missed
      const firstKnown = list.querySelector('.sidebar-item.known');
      if (firstKnown) {
        list.insertBefore(li, firstKnown);
      } else {
        list.appendChild(li);
      }
    }
  }

  // Tooltip hover logic
  const tip = document.getElementById('tooltip');
  document.getElementById('sidebar-list').addEventListener('mouseover', e => {
    const item = e.target.closest('.sidebar-item');
    if (!item || !item.dataset.word) return;
    const data = JSON.parse(item.dataset.word);
    document.getElementById('tip-word').textContent = data.word;
    document.getElementById('tip-reading').textContent = data.reading;
    document.getElementById('tip-pos').textContent = data.type;
    document.getElementById('tip-meaning').textContent = data.meaning;
    document.getElementById('tip-example').textContent = data.exampleJp || '';
    document.getElementById('tip-example-en').textContent = data.exampleEn || '';

    const rect = item.getBoundingClientRect();
    const sidebar = document.querySelector('.sidebar');
    tip.style.left = sidebar.getBoundingClientRect().right + 'px';
    tip.style.top = rect.top + 'px';
    tip.style.transform = '';
    tip.classList.add('visible');
  });
  document.getElementById('sidebar-list').addEventListener('mouseout', e => {
    const item = e.target.closest('.sidebar-item');
    if (!item) return;
    if (!item.contains(e.relatedTarget)) {
      tip.classList.remove('visible');
    }
  });

  function startNextRound() {
    round++;
    remaining = [...redo];
    redo = [];
    updateStats();

    // Reset sidebar: clear all, re-populate with remaining as unseen
    const list = document.getElementById('sidebar-list');
    list.innerHTML = '';
    remaining.forEach(word => {
      const li = document.createElement('li');
      li.className = 'sidebar-item unseen';
      li.textContent = word.word;
      li.dataset.word = JSON.stringify(word);
      li.dataset.id = word.word;
      list.appendChild(li);
    });
  }

  function next() {
    if (remaining.length === 0) {
      if (redo.length > 0) {
        startNextRound();
      } else {
        // Session complete
        document.querySelector('.word-jp').textContent = 'Done!';
        document.querySelector('.example-jp').textContent = 'All words cleared.';
        document.getElementById('action-next').style.display = 'none';
        return;
      }
    }

    currentWord = remaining[0];
    showWord();

    // Reset to placeholders
    document.getElementById('val-reading').innerHTML = placeholder;
    document.getElementById('val-meaning').innerHTML = placeholder;
    document.getElementById('val-type').innerHTML = placeholder;
    document.getElementById('val-example').innerHTML = placeholder;

    document.querySelector('.word-jp').classList.remove('knew', 'missed');
    document.getElementById('action-prompt').style.display = 'flex';
    document.getElementById('action-next').style.display = 'none';
  }

  // Initialize
  showWord();
  updateStats();

  document.addEventListener('keydown', e => {
    if (e.key === ' ') e.preventDefault();
    const prompt = document.getElementById('action-prompt');
    if (prompt.style.display !== 'none') {
      if (e.key === 'd' || e.key === 'D') reveal(true);
      if (e.key === 'a' || e.key === 'A') reveal(false);
    } else {
      if (e.key === ' ') next();
    }
  });
</script>

</body>
</html>
