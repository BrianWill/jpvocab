<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lexicon</title>
<link rel="icon" href="/static/favicon.ico">
<link rel="stylesheet" href="/static/common.css">
<link rel="stylesheet" href="/static/lexicon.css">
</head>
<body>

<div class="page-header">
  <span class="page-meta" id="word-count" data-tooltip="Active words have not yet reached their target drill count and are eligible to be drawn in drills"></span>
  <button class="btn-header" data-tooltip="Add words">＋</button>
  <div class="nav-and-settings">
    <button class="btn-settings" id="settings-btn" aria-label="Settings">⚙</button>
    <div class="page-nav-links">
      <a class="page-nav-link" href="/activity">Activity →</a>
      <a class="page-nav-link page-nav-link--current" href="/lexicon">Lexicon</a>
      <a class="page-nav-link" href="/drill">Drill →</a>
    </div>
  </div>
</div>

<div class="table-wrap">
  <table class="word-table">
    <thead>
      <tr>
        <th data-tooltip="Japanese word">
          <div class="th-inner">
            Word
            <span class="th-sort-btns">
              <button class="btn-sort btn-sort--active" data-sort="added" data-dir="desc" data-tooltip="Sort by date added">↓ added</button>
              <button class="btn-sort" data-sort="drilled" data-dir="desc" data-tooltip="Sort by last drilled date">↓ drilled</button>
            </span>
          </div>
        </th>
        <th data-tooltip="Hiragana reading">
          <div class="th-inner">
            Reading
            <span class="th-sort-btns">
              <button class="btn-sort" data-sort="reading" data-dir="desc" data-tooltip="Sort by reading (あいうえお order)">↓</button>
            </span>
          </div>
        </th>
        <th data-tooltip="Part of speech">
          <div class="th-inner">
            Type
            <span class="th-sort-btns">
              <button class="btn-sort" data-sort="type" data-tooltip="Group by part of speech; within each group, words are ordered by last drilled date">≡ group</button>
            </span>
          </div>
        </th>
        <th data-tooltip="English meaning">Meaning</th>
        <th class="col-num" data-tooltip="Times answered correctly">
          <div class="th-inner center"><span class="th-correct">✓</span>
            <span class="th-sort-btns">
              <button class="btn-sort" data-sort="correct" data-dir="desc" data-tooltip="Sort by correct answer count">↓</button>
            </span>
          </div>
        </th>
        <th class="col-num" data-tooltip="Times answered incorrectly">
          <div class="th-inner center"><span class="th-incorrect">✗</span>
            <span class="th-sort-btns">
              <button class="btn-sort" data-sort="incorrect" data-dir="desc" data-tooltip="Sort by incorrect answer count">↓</button>
            </span>
          </div>
        </th>
        <th class="col-num" data-tooltip="Target number of additional drills">
          <div class="th-inner center"><span class="th-emoji-grey">🎯</span>
            <span class="th-sort-btns">
              <button class="btn-sort" data-sort="target" data-dir="desc" data-tooltip="Sort by target drill count">↓</button>
            </span>
          </div>
        </th>
        <th class="col-spacer"></th>
      </tr>
    </thead>
    <tbody id="word-tbody"></tbody>
  </table>
</div>

<div id="add-modal-backdrop" class="modal-backdrop hidden">
  <div class="modal modal--add">
    <div class="modal-header">
      <span class="modal-word-label">Add words</span>
      <button class="modal-close">✕</button>
    </div>
    <div class="modal-body add-modal-body">
      <div class="add-modal-sidebar" id="add-modal-sidebar"></div>
      <div class="add-modal-main">
        <div class="modal-field">
          <label for="add-words-input">Japanese text to extract words from — nouns, verbs, adjectives, and adverbs will be added</label>
          <textarea id="add-words-input" rows="8" placeholder="今日は天気がいいので、公園で走ったり、美しい花を見たりした。"></textarea>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <span id="add-modal-status" class="add-modal-status"></span>
      <button class="btn-cancel">Cancel</button>
      <button class="btn-save">Add</button>
    </div>
  </div>
</div>

<div class="modal-backdrop hidden" id="add-result-modal-backdrop">
  <div class="modal modal-wide">
    <div class="modal-header">
      <span id="add-result-modal-title">Edit words</span>
      <button class="modal-close" id="add-result-modal-close">✕</button>
    </div>
    <div class="modal-status" id="add-result-modal-status"></div>
    <div class="modal-body modal-body-scroll" id="add-result-modal-body"></div>
    <div class="modal-footer" id="add-result-modal-footer"></div>
  </div>
</div>

<div id="generate-confirm-modal-backdrop" class="modal-backdrop hidden">
  <div class="modal">
    <div class="modal-body">
      <p>Generate readings, POS, meanings, and sentences for:</p>
      <label class="generate-confirm-option">
        <input type="checkbox" id="generate-confirm-added-checkbox">
        <span id="generate-confirm-added-text"></span>
      </label>
      <label class="generate-confirm-option">
        <input type="checkbox" id="generate-confirm-skipped-checkbox">
        <span id="generate-confirm-skipped-text"></span>
      </label>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" id="generate-confirm-cancel">Cancel</button>
      <button id="generate-confirm-ok" class="btn-save">Generate</button>
    </div>
  </div>
</div>

<div id="remove-confirm-modal-backdrop" class="modal-backdrop hidden">
  <div class="modal">
    <div class="modal-body">
      <p id="remove-confirm-text"></p>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" id="remove-confirm-cancel">Cancel</button>
      <button id="remove-confirm-ok" class="btn-danger">Remove</button>
    </div>
  </div>
</div>

<div id="delete-modal-backdrop" class="modal-backdrop hidden">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-word-label" id="delete-modal-label"></span>
      <button class="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <p class="delete-confirm-text">Delete this word from the lexicon? This cannot be undone.</p>
    </div>
    <div class="modal-footer">
      <span class="modal-error hidden" id="delete-error"></span>
      <button class="btn-cancel">Cancel</button>
      <button id="btn-delete-confirm" class="btn-danger">Delete</button>
    </div>
  </div>
</div>

<script type="module" src="/static/common.js"></script>
<script type="module" src="/static/lexicon.js"></script>
</body>
</html>
