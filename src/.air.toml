# Air configuration for jpvocab Go server
# Run with: air (from the src/ directory)

root = "."
tmp_dir = "../air-tmp"

[build]
  cmd = "go build -o ../air-tmp/main.exe ."
  bin = "../air-tmp/main.exe"
  include_ext = ["go"]
  exclude_dir = ["tmp", "static", "cmd"]
  delay = 500

[log]
  time = false

[color]
  build = "yellow"
  runner = "green"
  watcher = "cyan"
  main = "magenta"
