<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Japanese TTS Demo</title>
<link rel="icon" href="/static/favicon.ico">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #1e1e2e;
  color: #cdd6f4;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 3rem 1rem;
  gap: 2rem;
}

h1 {
  font-size: 1rem;
  font-weight: 600;
  color: #585b70;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

.card {
  background: #181825;
  border: 1px solid #313244;
  border-radius: 8px;
  padding: 1.5rem 2rem;
  width: 100%;
  max-width: 480px;
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
}

.label {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: #585b70;
}

.jp-text {
  font-size: 2rem;
  font-weight: 700;
  color: #cdd6f4;
}

.sentence {
  font-size: 1rem;
  color: #cdd6f4;
  line-height: 1.6;
}

button {
  align-self: flex-start;
  margin-top: 0.25rem;
  background: rgba(137,180,250,0.1);
  border: 1px solid rgba(137,180,250,0.25);
  color: #89b4fa;
  border-radius: 6px;
  padding: 0.5rem 1.2rem;
  font-size: 0.85rem;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: background 0.1s;
}
button:hover { background: rgba(137,180,250,0.18); }
button:active { transform: scale(0.97); }

#status {
  font-size: 0.8rem;
  color: #585b70;
  min-height: 1.2em;
}

select {
  background: #11111b;
  border: 1px solid #313244;
  border-radius: 4px;
  color: #cdd6f4;
  font-size: 0.85rem;
  font-family: inherit;
  padding: 0.4rem 0.6rem;
  cursor: pointer;
  width: 100%;
}
select:focus { outline: 1px solid #89b4fa; }

.slider-row {
  display: flex;
  align-items: center;
  gap: 0.75rem;
}
input[type=range] {
  flex: 1;
  accent-color: #89b4fa;
  cursor: pointer;
}
.slider-value {
  font-size: 0.9rem;
  font-weight: 600;
  color: #89b4fa;
  min-width: 3ch;
  text-align: right;
}
</style>
</head>
<body>

<h1>Web Speech API — Japanese TTS Demo</h1>

<div class="card">
  <span class="label">Voice</span>
  <select id="voice-select"><option>Loading voices…</option></select>
  <span class="label" style="margin-top:0.25rem">Speed</span>
  <div class="slider-row">
    <input type="range" id="rate-slider" min="0.5" max="2.0" step="0.05" value="0.9"
           oninput="document.getElementById('rate-display').textContent = parseFloat(this.value).toFixed(2)">
    <span class="slider-value" id="rate-display">0.90</span>
  </div>
  <div id="status"></div>
</div>

<div class="card">
  <span class="label">Word</span>
  <span class="jp-text" id="word">食べる</span>
  <button onclick="speak(document.getElementById('word').textContent)">▶ Speak word</button>
</div>

<div class="card">
  <span class="label">Example sentence</span>
  <span class="sentence" id="sentence">毎朝、朝ごはんを食べる前にコーヒーを飲みます。</span>
  <button onclick="speak(document.getElementById('sentence').textContent)">▶ Speak sentence</button>
</div>

<div class="card">
  <span class="label">Custom input</span>
  <textarea id="custom-input" rows="3" style="
    background: #11111b; border: 1px solid #313244; border-radius: 4px;
    color: #cdd6f4; font-size: 1rem; font-family: inherit;
    padding: 0.5rem; resize: vertical;
  ">日本語を入力してください</textarea>
  <button onclick="speak(document.getElementById('custom-input').value)">▶ Speak</button>
</div>


<script>
const synth = window.speechSynthesis;
let japaneseVoices = [];

function loadVoices() {
  const all = synth.getVoices();
  japaneseVoices = all.filter(v => v.lang === 'ja-JP' || v.lang.startsWith('ja'));

  const sel = document.getElementById('voice-select');
  const status = document.getElementById('status');

  if (japaneseVoices.length === 0) {
    sel.innerHTML = '<option>No Japanese voices found</option>';
    status.textContent = 'Install a Japanese voice via OS Settings → Time & Language → Speech.';
    return;
  }

  sel.innerHTML = japaneseVoices.map((v, i) =>
    `<option value="${i}">${v.name} (${v.lang})${v.localService ? '' : ' — online'}</option>`
  ).join('');
}

loadVoices();
if (synth.onvoiceschanged !== undefined) {
  synth.onvoiceschanged = loadVoices;
}

function selectedVoice() {
  const i = document.getElementById('voice-select').value;
  return japaneseVoices[i] || null;
}

function speak(text) {
  if (!text.trim()) return;
  synth.cancel();

  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'ja-JP';
  const v = selectedVoice();
  if (v) utt.voice = v;
  utt.rate = parseFloat(document.getElementById('rate-slider').value);

  const status = document.getElementById('status');
  utt.onstart  = () => status.textContent = 'Speaking…';
  utt.onend    = () => status.textContent = '';
  utt.onerror  = (e) => status.textContent = `Error: ${e.error}`;

  synth.speak(utt);
}
</script>
</body>
</html>
