<html lang="en">
<head>

    <div class="page-nav-links">
      <a class="page-nav-link" href="/drill">Drill →</a>
      <a class="page-nav-link page-nav-link--current" href="/activity">Activity</a>
      <a class="page-nav-link" href="/lexicon">Lexicon →</a>
      <a class="app-logo" href="/welcome">語</a>
    </div>
  </div>
</div>

<div class="activity-body">
  <div id="stats-section"></div>
  <div class="calendar-wrap">
    <div class="day-labels" id="day-labels"></div>
    <div class="calendar" id="calendar"></div>
  </div>
</div>

<div id="day-modal-backdrop" class="modal-backdrop hidden">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-word-label" id="day-modal-title"></span>
      <button class="modal-close">✕</button>
    </div>
    <div class="modal-body" id="day-modal-body"></div>
  </div>
</div>

<div class="tooltip word-tooltip" id="activity-word-tooltip">
  <div class="tooltip-cols">
    <div class="tooltip-main">
      <div class="tooltip-word" data-word-tooltip="word"></div>
      <div class="tooltip-reading" data-word-tooltip="reading"></div>
      <div class="tooltip-pos" data-word-tooltip="pos"></div>
      <div class="tooltip-meaning" data-word-tooltip="meaning"></div>
      <div class="tooltip-example" data-word-tooltip="example"></div>
      <div class="tooltip-example-en" data-word-tooltip="example-en"></div>
      <img class="tooltip-word-image" data-word-tooltip="image" alt="" style="display:none">
    </div>
    <div class="word-tooltip-kanji" data-word-tooltip="kanji"></div>
  </div>
</div>

<script type="module" src="/static/common.js"></script>
<script type="module" src="/static/activity.js"></script>
</body>
</html>
