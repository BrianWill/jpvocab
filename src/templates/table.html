{{define "content"}}
<nav><a href="/admin">← tables</a></nav>
<h1>{{.Table}}</h1>


{{if .Rows}}
<table>
  <thead>
    <tr>{{range .Cols}}<th>{{.}}</th>{{end}}</tr>
  </thead>
  <tbody>
    {{range .Rows}}
    <tr>{{range .}}<td>{{.}}</td>{{end}}</tr>
    {{end}}
  </tbody>
</table>
{{else}}
<p class="empty">No rows.</p>
{{end}}
{{end}}
