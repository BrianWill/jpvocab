<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lexicon</title>
<link rel="stylesheet" href="/static/common.css">
<link rel="stylesheet" href="/static/lexicon.css">
</head>
<body>

<div class="page-header">
  <span class="page-meta" id="word-count" data-tooltip="Active words have not yet reached their target drill count and are eligible to be drawn in drills"></span>
  <button class="btn-header" onclick="openAddModal()" data-tooltip="Add words">＋</button>
  <div class="page-nav-links">
    <a class="page-nav-link" href="/activity">Activity →</a>
    <a class="page-nav-link page-nav-link--current" href="/lexicon">Lexicon</a>
    <a class="page-nav-link" href="/drill">Drill →</a>
  </div>
</div>

<div class="table-wrap">
  <table class="word-table">
    <thead>
      <tr>
        <th data-tooltip="Japanese word">
          <div class="th-inner">
            Word
            <span class="th-sort-btns">
              <button class="btn-sort btn-sort--active" data-sort="added" data-dir="desc" data-tooltip="Sort by date added">↓ added</button>
              <button class="btn-sort" data-sort="drilled" data-dir="desc" data-tooltip="Sort by last drilled date">↓ drilled</button>
            </span>
          </div>
        </th>
        <th data-tooltip="Hiragana reading">Reading</th>
        <th data-tooltip="Part of speech">
          <div class="th-inner">
            Type
            <span class="th-sort-btns">
              <button class="btn-sort" data-sort="type" data-tooltip="Group by part of speech; within each group, words are ordered by last drilled date">≡ group</button>
            </span>
          </div>
        </th>
        <th data-tooltip="English meaning">Meaning</th>
        <th class="col-num" data-tooltip="Times answered correctly">
          <div class="th-inner center"><span class="th-correct">✓</span>
            <span class="th-sort-btns">
              <button class="btn-sort" data-sort="correct" data-dir="desc" data-tooltip="Sort by correct answer count">↓</button>
            </span>
          </div>
        </th>
        <th class="col-num" data-tooltip="Times answered incorrectly">
          <div class="th-inner center"><span class="th-incorrect">✗</span>
            <span class="th-sort-btns">
              <button class="btn-sort" data-sort="incorrect" data-dir="desc" data-tooltip="Sort by incorrect answer count">↓</button>
            </span>
          </div>
        </th>
        <th class="col-num" data-tooltip="Target number of additional drills">
          <div class="th-inner center"><span class="th-emoji-grey">🎯</span>
            <span class="th-sort-btns">
              <button class="btn-sort" data-sort="target" data-dir="desc" data-tooltip="Sort by target drill count">↓</button>
            </span>
          </div>
        </th>
        <th class="col-spacer"></th>
      </tr>
    </thead>
    <tbody id="word-tbody"></tbody>
  </table>
</div>

<div id="add-modal-backdrop" class="modal-backdrop hidden" onclick="onBackdropClick(event, closeAddModal)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-word-label">Add words</span>
      <button class="modal-close" onclick="closeAddModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-field">
        <label for="add-words-input">Words to add — separate with spaces, commas, or newlines</label>
        <textarea id="add-words-input" rows="8" placeholder="食べる 走る, 静か&#10;美しい、難しい"></textarea>
      </div>
      <div class="add-modal-options">
        <label class="checkbox-label">
          <input type="checkbox" id="autofill-check"> Auto-fill via AI
          <span id="autofill-msg" class="autofill-msg"></span>
        </label>
        <select id="ai-model-select" disabled>
          <optgroup label="Anthropic">
            <option value="anthropic/claude-haiku-4-5-20251001">claude-haiku (fast)</option>
            <option value="anthropic/claude-sonnet-4-6">claude-sonnet (better)</option>
          </optgroup>
          <optgroup label="OpenAI">
            <option value="openai/gpt-4o-mini">gpt-4o-mini (fast)</option>
            <option value="openai/gpt-4o">gpt-4o (better)</option>
          </optgroup>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeAddModal()">Cancel</button>
      <button class="btn-save" onclick="saveAddModal()">Add</button>
    </div>
  </div>
</div>

<div id="modal-backdrop" class="modal-backdrop hidden" onclick="onBackdropClick(event, closeModal)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-word-label" id="modal-word-label"></span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-field">
        <label for="edit-reading">Reading</label>
        <input id="edit-reading" type="text">
      </div>
      <div class="modal-field">
        <label for="edit-type">Type</label>
        <select id="edit-type">
          <option value="godan-verb">GODAN-VERB</option>
          <option value="ichidan-verb">ICHIDAN-VERB</option>
          <option value="noun">NOUN</option>
          <option value="i-adjective">I-ADJECTIVE</option>
          <option value="na-adjective">NA-ADJECTIVE</option>
          <option value="adverb">ADVERB</option>
        </select>
      </div>
      <div class="modal-field">
        <label for="edit-meaning">Meaning</label>
        <input id="edit-meaning" type="text">
      </div>
      <div class="modal-field">
        <label for="edit-ex-jp">Example (Japanese)</label>
        <input id="edit-ex-jp" type="text">
      </div>
      <div class="modal-field">
        <label for="edit-ex-en">Example (English)</label>
        <input id="edit-ex-en" type="text">
      </div>
      <div class="modal-field">
        <label for="edit-target">Target drills</label>
        <div class="num-stepper">
          <button class="num-btn" type="button" onmousedown="startStep(adjustTarget,-1)" onmouseup="stopStep()" onmouseleave="stopStep()">−</button>
          <input id="edit-target" type="number" min="0" oninput="capTargetInput(this)">
          <button class="num-btn" type="button" onmousedown="startStep(adjustTarget,1)" onmouseup="stopStep()" onmouseleave="stopStep()">+</button>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <span class="modal-error hidden" id="edit-error"></span>
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button id="btn-edit-save" class="btn-save" onclick="saveModal()">Save</button>
    </div>
  </div>
</div>

<div class="modal-backdrop hidden" id="progress-modal-backdrop">
  <div class="modal modal-wide">
    <div class="modal-header">
      <span>Add words</span>
    </div>
    <div class="modal-status" id="progress-modal-status"></div>
    <div class="modal-body modal-body-scroll" id="progress-modal-body"></div>
    <div class="modal-footer" id="progress-modal-footer"></div>
  </div>
</div>

<div id="delete-modal-backdrop" class="modal-backdrop hidden" onclick="onBackdropClick(event, closeDeleteModal)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-word-label" id="delete-modal-label"></span>
      <button class="modal-close" onclick="closeDeleteModal()">✕</button>
    </div>
    <div class="modal-body">
      <p class="delete-confirm-text">Delete this word from the lexicon? This cannot be undone.</p>
    </div>
    <div class="modal-footer">
      <span class="modal-error hidden" id="delete-error"></span>
      <button class="btn-cancel" onclick="closeDeleteModal()">Cancel</button>
      <button id="btn-delete-confirm" class="btn-danger" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<script src="/static/lexicon.js"></script>
</body>
</html>
