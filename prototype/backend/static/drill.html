<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drill</title>
<link rel="icon" href="/static/favicon.ico">
<link rel="stylesheet" href="/static/common.css">
<link rel="stylesheet" href="/static/drill.css">
</head>
<body>

<div class="page-header">
  <button class="btn-header" title="Restart drill">↺</button>
  <span class="header-began" id="header-began"></span>
  <div class="header-counter"><span id="stat-togo"></span></div>
  <div class="header-progress" id="progress-bar-container"><div class="progress-bar"></div></div>
  <div class="nav-and-settings">
    <button class="btn-settings" id="settings-btn" aria-label="Settings"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg></button>
    <div class="page-nav-links">
      <a class="page-nav-link page-nav-link--current" href="/drill">Drill</a>
      <a class="page-nav-link" href="/activity">Activity →</a>
      <a class="page-nav-link" href="/lexicon">Lexicon →</a>
      <a class="app-logo" href="/welcome">語</a>
    </div>
  </div>
</div>

<div class="page-body">

<!-- Sidebar -->
<div class="sidebar">
  <div class="sidebar-title" id="sidebar-title">Round 1</div>
  <ul class="sidebar-list" id="sidebar-list"></ul>
</div>

<!-- Floating tooltips -->
<div class="tooltip word-tooltip" id="tooltip">
  <div class="tooltip-cols">
    <div class="tooltip-main">
      <div class="tooltip-word" data-word-tooltip="word"></div>
      <div class="tooltip-reading" data-word-tooltip="reading"></div>
      <div class="tooltip-pos" data-word-tooltip="pos"></div>
      <div class="tooltip-meaning" data-word-tooltip="meaning"></div>
      <div class="tooltip-example" data-word-tooltip="example"></div>
      <div class="tooltip-example-en" data-word-tooltip="example-en"></div>
      <img class="tooltip-word-image" data-word-tooltip="image" alt="" style="display:none">
    </div>
    <div class="last-kanji-info word-tooltip-kanji" data-word-tooltip="kanji"></div>
  </div>
</div>

<!-- Main content -->
<div class="content">
  <div class="main-area">
    <div class="prompt-section">
      <div class="word-jp" id="prompt-word-jp"></div>
      <div class="example-jp" id="prompt-example-jp"></div>
    </div>
  </div>

  <div class="button-area">
    <div class="action-bar" id="action-prompt">
      <button class="btn btn-no">
        ✕ Don't know <span class="key-hint">A</span>
      </button>
      <button class="btn btn-yes">
        ✓ Do know <span class="key-hint">D</span>
      </button>
    </div>
  </div>

  <div class="last-word-card" id="last-word-card" style="display:none">
    <div class="last-word-cols">
      <div class="last-word-main">
        <div id="last-word-jp" class="tooltip-word"></div>
        <div id="last-reading" class="tooltip-reading"></div>
        <div id="last-pos" class="tooltip-pos"></div>
        <div id="last-meaning" class="tooltip-meaning"></div>
        <div id="last-example-jp" class="tooltip-example"></div>
        <div id="last-example-en" class="tooltip-example-en"></div>
        <img id="last-word-image" class="last-word-image" alt="" style="display:none">
      </div>
      <div id="last-kanji-info" class="last-kanji-info"></div>
    </div>
  </div>
</div>

</div><!-- .page-body -->

<div id="restart-modal-backdrop" class="modal-backdrop hidden">
  <div class="modal restart-modal">
    <div class="modal-header">
      <span class="modal-word-label">New drill</span>
      <button class="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <div class="restart-field">
        <label>Max total words</label>
        <div class="num-stepper">
          <button class="num-btn" type="button">−</button>
          <input type="number" id="restart-total-words" min="1">
          <button class="num-btn" type="button">+</button>
        </div>
      </div>
      <div class="restart-field">
        <label>Words per round</label>
        <div class="num-stepper">
          <button class="num-btn" type="button">−</button>
          <input type="number" id="restart-round-size" min="1">
          <button class="num-btn" type="button">+</button>
        </div>
      </div>
      <div class="restart-field restart-field-filter">
        <label>Word type</label>
        <div class="filter-chips">
          <button type="button" class="filter-chip active" data-filter="katakana">Katakana</button>
          <button type="button" class="filter-chip active" data-filter="verbs">Verbs</button>
          <button type="button" class="filter-chip active" data-filter="nouns">Nouns</button>
          <button type="button" class="filter-chip active" data-filter="other">Other</button>
        </div>
      </div>
      <div class="filter-hint" id="filter-hint"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel">Cancel</button>
      <button class="btn-save" id="restart-start-btn">Start</button>
    </div>
  </div>
</div>

<script type="module" src="/static/common.js"></script>
<script type="module" src="/static/drill.js"></script>

</body>
</html>
