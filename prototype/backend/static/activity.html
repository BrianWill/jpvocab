<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activity</title>
<link rel="icon" href="/static/favicon.ico">
<link rel="stylesheet" href="/static/common.css">
<link rel="stylesheet" href="/static/activity.css">
</head>
<body>

<div class="page-header">
  <div class="nav-and-settings">
    <button class="btn-settings" id="settings-btn" aria-label="Settings">⚙</button>
    <div class="page-nav-links">
      <a class="page-nav-link page-nav-link--current" href="/activity">Activity</a>
      <a class="page-nav-link" href="/lexicon">Lexicon →</a>
      <a class="page-nav-link" href="/drill">Drill →</a>
    </div>
  </div>
</div>

<div class="activity-body">
  <div id="stats-section"></div>
  <div class="calendar-wrap">
    <div class="day-labels" id="day-labels"></div>
    <div class="calendar" id="calendar"></div>
  </div>
</div>

<div id="day-modal-backdrop" class="modal-backdrop hidden">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-word-label" id="day-modal-title"></span>
      <button class="modal-close">✕</button>
    </div>
    <div class="modal-body" id="day-modal-body"></div>
  </div>
</div>

<div id="settings-modal-backdrop" class="modal-backdrop hidden">
  <div class="modal">
    <div class="modal-header">
      <span>Settings</span>
      <button class="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <p style="color: #a6adc8;">Settings coming soon…</p>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" id="settings-close-btn">Close</button>
    </div>
  </div>
</div>

<script type="module" src="/static/common.js"></script>
<script type="module" src="/static/activity.js"></script>
</body>
</html>
