<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lexicon</title>
<link rel="stylesheet" href="lexicon.css">
</head>
<body>

<div class="page-header">
  <span class="page-title">Lexicon</span>
  <span class="page-meta" id="word-count"></span>
</div>

<div class="table-wrap">
  <table class="word-table">
    <thead>
      <tr>
        <th>Word</th>
        <th>Reading</th>
        <th>Type</th>
        <th>Meaning</th>
        <th class="col-num">✓</th>
        <th class="col-num">✗</th>
      </tr>
    </thead>
    <tbody id="word-tbody"></tbody>
  </table>
</div>

<script src="lexicon.js"></script>
</body>
</html>
