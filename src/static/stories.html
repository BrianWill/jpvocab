<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stories</title>
<link rel="icon" href="/static/favicon.ico">
<link rel="stylesheet" href="/static/common.css">
<link rel="stylesheet" href="/static/stories.css">
</head>
<body>

<div class="page-header">
  <button class="btn-header" data-tooltip="Add story">＋</button>
  <div class="nav-and-settings">
    <button class="btn-settings" id="settings-btn" aria-label="Settings"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg></button>
    {{template "app_nav" .}}
  </div>
</div>

<main class="stories-body">
  <div class="stories-shell">
    <div id="stories-list" class="stories-list"></div>
    <p id="stories-empty" class="stories-empty" hidden>No stories yet.</p>
  </div>
</main>

<div id="story-add-modal-backdrop" class="modal-backdrop hidden">
  <div class="modal modal--add modal--story-add">
    <div class="modal-header">
      <span class="modal-word-label">Add story</span>
      <button class="modal-close">✕</button>
    </div>
    <div class="modal-body story-add-modal-body">
      <div class="story-add-modal-main">
        <div class="modal-field">
          <label for="story-title-input">Story title</label>
          <input id="story-title-input" type="text" maxlength="200" placeholder="Story title">
        </div>
        <div class="modal-field">
          <label for="story-content-input">Story content</label>
          <textarea id="story-content-input" rows="14" placeholder="Paste story text here."></textarea>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <span class="modal-error hidden" id="story-add-error"></span>
      <button class="btn-cancel">Cancel</button>
      <button id="story-add-confirm" class="btn-save">Add</button>
    </div>
  </div>
</div>

<div id="story-delete-modal-backdrop" class="modal-backdrop hidden">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-word-label" id="story-delete-modal-label"></span>
      <button class="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <p class="delete-confirm-text">Delete this story? This cannot be undone.</p>
    </div>
    <div class="modal-footer">
      <span class="modal-error hidden" id="story-delete-error"></span>
      <button class="btn-cancel">Cancel</button>
      <button id="story-delete-confirm" class="btn-danger">Delete</button>
    </div>
  </div>
</div>

<script type="module" src="/static/common.js"></script>
<script type="module" src="/static/stories.js"></script>
</body>
</html>
