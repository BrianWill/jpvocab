<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drill</title>
<link rel="stylesheet" href="common.css">
<link rel="stylesheet" href="drill.css">
</head>
<body>

<div class="page-header">
  <span class="page-title">Drill</span>
  <span class="header-began" id="header-began"></span>
  <button class="btn-header" onclick="openRestartModal()" title="Restart drill">↺</button>
  <div class="header-progress" id="progress-bar-container"><div class="progress-bar"></div></div>
  <div class="header-counter"><span id="stat-togo"></span></div>
  <div class="page-nav-links">
    <a class="page-nav-link" href="activity.html">Activity →</a>
    <a class="page-nav-link" href="lexicon.html">Lexicon →</a>
  </div>
</div>

<div class="page-body">

<!-- Sidebar -->
<div class="sidebar">
  <div class="sidebar-title" id="sidebar-title">Round 1</div>
  <ul class="sidebar-list" id="sidebar-list"></ul>
</div>

<!-- Floating tooltips -->
<div class="tooltip" id="tooltip">
  <div class="tooltip-cols">
    <div class="tooltip-main">
      <div class="tooltip-word" id="tip-word"></div>
      <div class="tooltip-reading" id="tip-reading"></div>
      <div class="tooltip-pos" id="tip-pos"></div>
      <div class="tooltip-meaning" id="tip-meaning"></div>
      <div class="tooltip-example" id="tip-example"></div>
      <div class="tooltip-example-en" id="tip-example-en"></div>
    </div>
    <div id="tip-kanji-info" class="last-kanji-info tip-kanji-info"></div>
  </div>
</div>

<!-- Main content -->
<div class="content">
  <div class="main-area">
    <div class="prompt-section">
      <div class="word-jp" id="prompt-word-jp"></div>
      <div class="example-jp" id="prompt-example-jp"></div>
    </div>
  </div>

  <div class="button-area">
    <div class="action-bar" id="action-prompt">
      <button class="btn btn-no" onclick="reveal(false)">
        ✕ Don't know <span class="key-hint">A</span>
      </button>
      <button class="btn btn-yes" onclick="reveal(true)">
        ✓ Do know <span class="key-hint">D</span>
      </button>
    </div>
  </div>

  <div class="last-word-card" id="last-word-card" style="display:none">
    <div class="last-word-cols">
      <div class="last-word-main">
        <div id="last-word-jp" class="tooltip-word"></div>
        <div id="last-reading" class="tooltip-reading"></div>
        <div id="last-pos" class="tooltip-pos"></div>
        <div id="last-meaning" class="tooltip-meaning"></div>
        <div id="last-example-jp" class="tooltip-example"></div>
        <div id="last-example-en" class="tooltip-example-en"></div>
      </div>
      <div id="last-kanji-info" class="last-kanji-info"></div>
    </div>
  </div>
</div>

</div><!-- .page-body -->

<div id="restart-modal-backdrop" class="modal-backdrop hidden" onclick="handleRestartBackdropClick(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-word-label">New drill</span>
      <button class="modal-close" onclick="closeRestartModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="restart-field">
        <label>Total words</label>
        <div class="num-stepper">
          <button class="num-btn" type="button" onmousedown="startStep(adjustRestart,'restart-total-words',-5)" onmouseup="stopStep()" onmouseleave="stopStep()">−</button>
          <input type="number" id="restart-total-words" min="1" oninput="capRestartInput(this)">
          <button class="num-btn" type="button" onmousedown="startStep(adjustRestart,'restart-total-words',5)" onmouseup="stopStep()" onmouseleave="stopStep()">+</button>
        </div>
      </div>
      <div class="restart-field">
        <label>Words per round</label>
        <div class="num-stepper">
          <button class="num-btn" type="button" onmousedown="startStep(adjustRestart,'restart-round-size',-5)" onmouseup="stopStep()" onmouseleave="stopStep()">−</button>
          <input type="number" id="restart-round-size" min="1" oninput="capRestartInput(this)">
          <button class="num-btn" type="button" onmousedown="startStep(adjustRestart,'restart-round-size',5)" onmouseup="stopStep()" onmouseleave="stopStep()">+</button>
        </div>
      </div>
      <div class="restart-field restart-field-filter">
        <label>Word type</label>
        <div class="filter-chips">
          <button type="button" class="filter-chip active" data-filter="katakana">Katakana</button>
          <button type="button" class="filter-chip active" data-filter="verbs">Verbs</button>
          <button type="button" class="filter-chip active" data-filter="nouns">Nouns</button>
          <button type="button" class="filter-chip active" data-filter="other">Other</button>
        </div>
      </div>
      <div class="filter-hint" id="filter-hint"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeRestartModal()">Cancel</button>
      <button class="btn-save" id="restart-start-btn" onclick="confirmRestart()">Start</button>
    </div>
  </div>
</div>

<script src="dummy_data.js"></script>
<script src="./drill.js"></script>

</body>
</html>
