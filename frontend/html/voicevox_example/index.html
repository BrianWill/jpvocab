<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoiceVox Generator</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="layout">
  <div class="col-controls">
    <div class="card">
      <span class="section-label">Voice</span>
      <div class="two-col">
        <div class="field">
          <label for="char-select">Character</label>
          <select id="char-select"><option>Loading…</option></select>
        </div>
        <div class="field">
          <label for="style-select">Style</label>
          <select id="style-select"><option>—</option></select>
        </div>
      </div>
    </div>

    <div class="card">
      <span class="section-label">Prosody</span>
      <div class="slider-row">
        <label for="speed">Speed</label>
        <input type="range" id="speed" min="0.5" max="2.0" step="0.05" value="1.0"
               oninput="syncVal(this,'speed-val',2)">
        <span class="slider-val" id="speed-val">1.00</span>
      </div>
      <div class="slider-row">
        <label for="pitch">Pitch</label>
        <input type="range" id="pitch" min="-0.15" max="0.15" step="0.01" value="0.0"
               oninput="syncVal(this,'pitch-val',2)">
        <span class="slider-val" id="pitch-val">0.00</span>
      </div>
      <div class="slider-row">
        <label for="intonation">Intonation</label>
        <input type="range" id="intonation" min="0.0" max="2.0" step="0.1" value="1.0"
               oninput="syncVal(this,'intonation-val',1)">
        <span class="slider-val" id="intonation-val">1.0</span>
      </div>
      <div class="slider-row">
        <label for="volume">Volume</label>
        <input type="range" id="volume" min="0.0" max="2.0" step="0.1" value="1.0"
               oninput="syncVal(this,'volume-val',1)">
        <span class="slider-val" id="volume-val">1.0</span>
      </div>
    </div>

    <div class="card">
      <span class="section-label">Input</span>
      <div class="field">
        <label for="text-input">Text — one entry per line</label>
        <textarea id="text-input" placeholder="食べる&#10;飲む&#10;毎朝、朝ごはんを食べる前にコーヒーを飲みます。"></textarea>
      </div>
      <button id="gen-btn" onclick="generate()">Generate</button>
      <div id="status"></div>
    </div>
  </div>

  <div class="col-output">
    <span class="col-label">Output</span>
    <div id="results"></div>
  </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
